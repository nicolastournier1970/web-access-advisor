<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Form — WAA Fixture Site</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 720px; }
    label, input, select, button { display: block; margin-top: .75rem; }
  </style>
</head>
<body>
  <nav aria-label="Main">
    <a href="index.html" data-testid="nav-home">Home</a>
    <a href="form.html" data-testid="nav-form">Form</a>
    <a href="protected.html" data-testid="nav-protected">Protected area</a>
  </nav>

  <h1>Feedback form</h1>
  <form id="feedback" onsubmit="event.preventDefault(); document.getElementById('result').textContent = 'Thanks, ' + document.getElementById('name').value;">
    <label for="name">Your name</label>
    <input id="name" name="name" type="text" data-testid="name-input" />

    <!-- intentional violation: input without label -->
    <input name="nickname" type="text" placeholder="Nickname" data-testid="nickname-input" />

    <label for="topic">Topic</label>
    <select id="topic" name="topic" data-testid="topic-select">
      <option value="a11y">Accessibility</option>
      <option value="perf">Performance</option>
      <option value="other">Other</option>
    </select>

    <button type="submit" data-testid="submit-feedback">Send feedback</button>
  </form>
  <p id="result" role="status" data-testid="form-result"></p>
</body>
</html>
